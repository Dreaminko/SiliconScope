<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisPlayInfo Icon — Option A reference</title>
<style>
  body{margin:0;background:#16181d;color:#e8eaee;font-family:ui-sans-serif,system-ui,sans-serif;}
  .wrap{max-width:960px;margin:0 auto;padding:48px 32px 80px;}
  h1{font-size:24px;font-weight:700;margin:0 0 4px;}
  p.sub{color:#8b909c;margin:0 0 40px;font-size:14px;}
  .row{display:flex;align-items:flex-end;gap:40px;flex-wrap:wrap;margin-bottom:48px;}
  .hero img{width:256px;height:256px;filter:drop-shadow(0 24px 40px rgba(0,0,0,.55));border-radius:56px;}
  .sizes{display:flex;align-items:flex-end;gap:28px;}
  .sizes figure{margin:0;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .sizes img{filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));}
  .sizes figcaption{font-family:ui-monospace,monospace;font-size:11px;color:#8b909c;}
  .ctx{display:flex;gap:32px;flex-wrap:wrap;}
  .panel{flex:1;min-width:280px;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px;}
  .panel.light{background:#e7e8ec;}
  .panel h3{margin:0 0 16px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#8b909c;}
  .panel.light h3{color:#666b75;}
  .dock{display:flex;align-items:flex-end;gap:14px;padding:12px 18px;border-radius:22px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(12px);width:fit-content;}
  .panel.light .dock{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.08);}
  .dock img{width:54px;height:54px;border-radius:12px;}
  .placeholder{width:54px;height:54px;border-radius:12px;background:linear-gradient(135deg,#555,#333);}
  .panel.light .placeholder{background:linear-gradient(135deg,#bbb,#999);}
</style>
</head>
<body>
  <div class="wrap">
    <h1>WhisPlayInfo — App Icon (Option A · Activity bars)</h1>
    <p class="sub">Master vector: <code>WhisPlayInfo-icon-A.svg</code> · Raster master: <code>WhisPlayInfo-icon-A-1024.png</code></p>

    <div class="row">
      <div class="hero"><img src="WhisPlayInfo-icon-A-1024.png" alt="icon 256"></div>
      <div class="sizes">
        <figure><img src="WhisPlayInfo-icon-A-1024.png" width="128" height="128"><figcaption>128</figcaption></figure>
        <figure><img src="WhisPlayInfo-icon-A-1024.png" width="64" height="64"><figcaption>64</figcaption></figure>
        <figure><img src="WhisPlayInfo-icon-A-1024.png" width="48" height="48"><figcaption>48</figcaption></figure>
        <figure><img src="WhisPlayInfo-icon-A-1024.png" width="32" height="32"><figcaption>32</figcaption></figure>
        <figure><img src="WhisPlayInfo-icon-A-1024.png" width="16" height="16"><figcaption>16</figcaption></figure>
      </div>
    </div>

    <div class="ctx">
      <div class="panel">
        <h3>In the Dock — Dark</h3>
        <div class="dock">
          <div class="placeholder"></div>
          <img src="WhisPlayInfo-icon-A-1024.png">
          <div class="placeholder"></div>
        </div>
      </div>
      <div class="panel light">
        <h3>In the Dock — Light</h3>
        <div class="dock">
          <div class="placeholder"></div>
          <img src="WhisPlayInfo-icon-A-1024.png">
          <div class="placeholder"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
